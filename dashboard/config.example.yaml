# Hermes Briefing — optional config.
# Copy to  ~/.hermes/briefing/config.yaml  and edit. Everything is optional;
# env vars (REPORTS_*) override these. Delete anything you don't need.

timezone: Europe/Berlin
language: en            # en | de

# Optional, explicit read-only sources outside this Hermes profile. Each root
# contains <board-slug>/kanban.db. Use external_board_dbs for individual DBs.
# These add to normal profile-local discovery; do not hard-code host paths here.
# `kanban_db` (or REPORTS_KANBAN_DB) remains a single-board override and wins.
# external_board_roots:
#   - /srv/hermes/kanban/boards
# external_board_dbs:
#   - /srv/approved-boards/operations/kanban.db

# Briefing automatically reads direct sibling profile state.db files when its active
# home is <profiles>/<active-profile>. It never recurses beyond those siblings.
# Optional roots and DBs below are additive read-only telemetry sources. Canonical
# paths (including symlinks) are read once; only recognized global session IDs are
# cross-DB deduplicated, and skipped sources are reported in API diagnostics.
# REPORTS_TELEMETRY_PROFILE_ROOTS and REPORTS_TELEMETRY_PROFILE_DBS accept the
# same paths separated by the platform path separator.
# telemetry_profile_roots:
#   - /srv/hermes/profiles
# telemetry_profile_dbs:
#   - /srv/approved-profiles/worker/state.db

# Learning event ledger. Briefing automatically ingests successful structured JSONL
# lifecycle records from its own `<reports_dir>/learning-events.jsonl` whenever a
# digest/range is built; the systemd timer/cron therefore ingests in the background.
# Extra files must be explicitly allowlisted (no recursive profile/host scans).
# Each line contains only: event_id, timestamp, event_type (skill_created,
# skill_updated, soul_updated, lesson_recorded), actor_profile, target_profile,
# artifact_id, source, provenance, reconstructed, success. A Lesson is only an
# explicit successful `lesson_recorded` operation, never a keyword/comment match.
# Prompt/session text, credentials, tokens, and secrets are rejected and never stored.
# learning_event_sources:
#   - /srv/approved-hermes-operation-metadata.jsonl

# TaskList membership is read from <hermes_home>/tasklist/lists.db when the
# plugin is installed. Set this only when that read-only DB lives elsewhere.
# Missing or incompatible TaskList DBs render tasks as "No List".
# tasklist_db: /srv/hermes/tasklist/lists.db

# Local times the systemd timer / cron builds the briefing — used to show
# "next build" in the dashboard. Match these to your timer.
schedule:
  - "19:30"

# $ (USD) per 1,000,000 tokens, matched by substring against the model name.
# !!! VERIFY against your provider's current prices — these are placeholders. !!!
pricing:
  gpt-5.5:
    input: 1.10
    output: 9.00
  _default:
    input: 1.00
    output: 5.00

# A `blocked` event whose reason contains one of these -> "needs your hand".
approval_keywords:
  - review-required
  - freigabe
  - boss
  - approval
  - wartet auf
  - dein ok

# Flag a task as unstable after this many protocol_violation events in a window.
protocol_violation_alert_threshold: 2

# AI summarizer — OFF by default to stay cheap. Turn on for richer "why" lines.
llm:
  enabled: false
  provider: openai          # openai (OpenAI-compatible) | anthropic
  base_url: https://api.openai.com/v1
  model: gpt-5.5-mini
  api_key: ""               # or set REPORTS_LLM_API_KEY / OPENAI_API_KEY
  max_tokens: 120
  temperature: 0.1

# Email delivery (used by send_report.py). Leave host empty to just print.
smtp:
  host: ""
  port: 587
  user: ""
  password: ""
  starttls: true
  sender: ""
  recipient: ""

# Only needed if PRAGMA auto-detection picks the wrong column. Run
# `python plugin_api.py inspect-schema` first, then override here, e.g.:
# schema:
#   event_kind: kind
#   event_data: data
#   event_ts: created_at
